version: "3.8"
services:
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "8080:8080"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8081:80"
    restart: unless-stopped

  apache:
    build:
      context: .
      dockerfile: Dockerfile.apache
    ports:
      - "8082:80"
    restart: unless-stopped
